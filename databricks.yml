bundle:
  name: supercharge-ai

include:
  - resources/*.yml

variables:
  git_sha:
    description: "Git SHA of the deployed commit"
    default: "local"
  deployed_by:
    description: "User or service account that deployed this bundle"
    default: "local-developer"
  deployment_source:
    description: "Source of deployment: local or cicd"
    default: "local"

artifacts:
  default:
    type: whl
    build: uv build
    path: .

targets:
  # Local development on feature branches — user-scoped, ephemeral
  # Deploys to /Users/${current-user}/.bundle/supercharge-ai/local/
  # Auto-pauses schedules, prefixes jobs with [dev ${user}]
  local:
    default: true
    mode: development
    workspace:
      host: https://dbc-8943fe10-4fbf.cloud.databricks.com
    variables:
      deployment_source: local

  # CI/CD deploys from dev branch → shared managed folder
  dev:
    mode: production
    workspace:
      host: https://dbc-8943fe10-4fbf.cloud.databricks.com
      root_path: /Workspace/supercharge-ai/dev
    variables:
      deployment_source: cicd

  # CI/CD deploys from stg branch → shared managed folder
  stg:
    mode: production
    workspace:
      host: https://dbc-8943fe10-4fbf.cloud.databricks.com
      root_path: /Workspace/supercharge-ai/stg
    variables:
      deployment_source: cicd

  # CI/CD deploys from master branch → shared managed folder
  prod:
    mode: production
    workspace:
      host: https://dbc-8943fe10-4fbf.cloud.databricks.com
      root_path: /Workspace/supercharge-ai/prod
    variables:
      deployment_source: cicd
