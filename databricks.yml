bundle:
  name: supercharge-ai

include:
  - resources/*.yml

variables:
  git_sha:
    description: "Git SHA of the deployed commit"
    default: "local"
  deployed_by:
    description: "User or service that deployed this bundle"
    default: "${env.USER}"
  deployment_source:
    description: "Source of deployment: local or cicd"
    default: "local"
  schedule_pause_status:
    description: "Schedule pause status"
    default: PAUSED

artifacts:
  default:
    type: whl
    build: uv build
    path: .

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-8943fe10-4fbf.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  stg:
    workspace:
      host: https://dbc-8943fe10-4fbf.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      schedule_pause_status: PAUSED

  prod:
    workspace:
      host: https://dbc-8943fe10-4fbf.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      schedule_pause_status: UNPAUSED
