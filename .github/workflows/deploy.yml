name: Deploy via DAB

on:
  push:
    branches:
      - dev
      - stg
      - master

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Databricks CLI
        run: pip install databricks==0.18.0

      - name: Build wheel
        run: uv build

      - name: Authenticate with Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databricks/DEFAULT << EOF
          host = ${{ secrets.DATABRICKS_DEV_HOST }}
          token = ${{ secrets.DATABRICKS_DEV_TOKEN }}
          EOF

      - name: Deploy to dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}
          DEPLOYED_BY: "github-actions[bot]"
          DEPLOYMENT_SOURCE: "cicd"
        run: python -m databricks.cli bundle deploy --target dev

      - name: Run validation job
        run: python -m databricks.cli bundle run hello_world_job --target dev

  deploy-stg:
    if: github.ref == 'refs/heads/stg'
    runs-on: ubuntu-latest
    environment:
      name: stg
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Databricks CLI
        run: pip install databricks==0.18.0

      - name: Build wheel
        run: uv build

      - name: Authenticate with Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STG_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_STG_TOKEN }}
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databricks/DEFAULT << EOF
          host = ${{ secrets.DATABRICKS_STG_HOST }}
          token = ${{ secrets.DATABRICKS_STG_TOKEN }}
          EOF

      - name: Deploy to stg
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STG_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_STG_TOKEN }}
          DEPLOYED_BY: "github-actions[bot]"
          DEPLOYMENT_SOURCE: "cicd"
        run: python -m databricks.cli bundle deploy --target stg

      - name: Run validation job
        run: python -m databricks.cli bundle run hello_world_job --target stg

  deploy-prod:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Databricks CLI
        run: pip install databricks==0.18.0

      - name: Build wheel
        run: uv build

      - name: Authenticate with Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databricks/DEFAULT << EOF
          host = ${{ secrets.DATABRICKS_PROD_HOST }}
          token = ${{ secrets.DATABRICKS_PROD_TOKEN }}
          EOF

      - name: Deploy to prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}
          DEPLOYED_BY: "github-actions[bot]"
          DEPLOYMENT_SOURCE: "cicd"
        run: python -m databricks.cli bundle deploy --target prod

      - name: Run validation job
        run: python -m databricks.cli bundle run hello_world_job --target prod
