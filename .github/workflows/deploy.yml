name: Deploy via DAB

on:
  push:
    branches:
      - dev
      - stg
      - master

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Build wheel
        run: uv build

      - name: Authenticate with Databricks via OAuth
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databricks/DEFAULT << EOF
          host = ${{ secrets.DATABRICKS_DEV_HOST }}
          client_id = ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
          auth_type = oauth
          EOF

      - name: Validate bundle configuration
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
        run: databricks bundle validate --target dev

      - name: Deploy to dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_DEV_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_CLIENT_SECRET }}
          DEPLOYED_BY: ${{ secrets.DATABRICKS_DEV_SERVICE_ACCOUNT }}
          DEPLOYMENT_SOURCE: "cicd"
        run: databricks bundle deploy --target dev

      - name: Run validation job
        run: databricks bundle run hello_world_job --target dev

  deploy-stg:
    if: github.ref == 'refs/heads/stg'
    runs-on: ubuntu-latest
    environment:
      name: stg
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Build wheel
        run: uv build

      - name: Authenticate with Databricks via OAuth
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STG_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_STG_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_STG_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databricks/DEFAULT << EOF
          host = ${{ secrets.DATABRICKS_STG_HOST }}
          client_id = ${{ secrets.DATABRICKS_STG_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_STG_CLIENT_SECRET }}
          auth_type = oauth
          EOF

      - name: Validate bundle configuration
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STG_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_STG_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_STG_CLIENT_SECRET }}
        run: databricks bundle validate --target stg

      - name: Deploy to stg
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STG_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_STG_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_STG_CLIENT_SECRET }}
          DEPLOYED_BY: ${{ secrets.DATABRICKS_STG_SERVICE_ACCOUNT }}
          DEPLOYMENT_SOURCE: "cicd"
        run: databricks bundle deploy --target stg

      - name: Run validation job
        run: databricks bundle run hello_world_job --target stg

  deploy-prod:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Build wheel
        run: uv build

      - name: Authenticate with Databricks via OAuth
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_PROD_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_PROD_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databricks/DEFAULT << EOF
          host = ${{ secrets.DATABRICKS_PROD_HOST }}
          client_id = ${{ secrets.DATABRICKS_PROD_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_PROD_CLIENT_SECRET }}
          auth_type = oauth
          EOF

      - name: Validate bundle configuration
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_PROD_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_PROD_CLIENT_SECRET }}
        run: databricks bundle validate --target prod

      - name: Deploy to prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_PROD_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_PROD_CLIENT_SECRET }}
          DEPLOYED_BY: ${{ secrets.DATABRICKS_PROD_SERVICE_ACCOUNT }}
          DEPLOYMENT_SOURCE: "cicd"
        run: databricks bundle deploy --target prod

      - name: Run validation job
        run: databricks bundle run hello_world_job --target prod
