resources:
  jobs:
    hello_world_job:
      name: Hello World Job
      description: Demonstrates basic notebook execution via DAB
      tags:
        deployed_by: ${var.deployed_by}
        source: ${var.deployment_source}
        environment: ${bundle.target}
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              # Custom package — wheel built by artifacts.default via uv build.
              # DAB uploads this to the workspace and rewrites the path at deploy time.
              - ../dist/*.whl
      tasks:
        - task_key: hello_world
          notebook_task:
            notebook_path: ../notebooks/1_hello_world.py
          environment_key: default
      max_concurrent_runs: 1
