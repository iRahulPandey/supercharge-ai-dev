resources:
  jobs:
    config_demo_job:
      name: Config Demo Job
      description: Demonstrates configuration loading and usage
      tags:
        deployed_by: ${var.deployed_by}
        source: ${var.deployment_source}
        environment: ${bundle.target}
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              # Custom package — wheel built by artifacts.default via uv build.
              # DAB uploads this to the workspace and rewrites the path at deploy time.
              # Installing the wheel pulls in its transitive deps (loguru, pydantic, pyyaml, etc.)
              - ../dist/*.whl
      tasks:
        - task_key: config_demo
          notebook_task:
            notebook_path: ../notebooks/2_config_usage.py
          environment_key: default
      max_concurrent_runs: 1
