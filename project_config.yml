# Project Configuration — per-environment + per-dataset
#
# Two top-level sections:
#   - Environment settings (local/dev/stg/prod): catalog + shared infra endpoints
#   - datasets: each ingestion's source (input) and destination (output), using
#     the same {catalog, schema, table} shape for both
#
# Notebooks receive `env` + `dataset` as parameters, then resolve:
#   - Source  = datasets[<dataset>].input   (fully qualified — catalog/schema/table all set)
#   - Target  = datasets[<dataset>].output  (catalog defaults to <env>.catalog if omitted)

# --- Environment settings ---

# Local target writes to the dev catalog for personal testing. Override to a
# user-specific catalog later if needed.
local:
  catalog: dev
  volume: data
  llm_endpoint: databricks-llama-4-maverick
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: "166b4b9f29a71c6a"
  vector_search_endpoint: supercharge_vs_endpoint
  genie_space_id: ""

dev:
  catalog: dev
  volume: data
  llm_endpoint: databricks-llama-4-maverick
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: "166b4b9f29a71c6a"
  vector_search_endpoint: supercharge_vs_endpoint
  genie_space_id: ""

stg:
  catalog: stg
  volume: data
  llm_endpoint: databricks-llama-4-maverick
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: "166b4b9f29a71c6a"
  vector_search_endpoint: supercharge_vs_endpoint
  genie_space_id: ""

prod:
  catalog: prd
  volume: data
  llm_endpoint: databricks-llama-4-maverick
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: "166b4b9f29a71c6a"
  vector_search_endpoint: supercharge_vs_endpoint
  genie_space_id: ""

# --- Datasets ---
#
# Same {catalog, schema, table} shape for both input and output. For output,
# `catalog` is optional — omit it to inherit the current env's catalog, or set
# explicitly if you want to write to a fixed catalog regardless of env.

datasets:
  media_customer_reviews:
    input:
      catalog: samples
      schema: bakehouse
      table: media_customer_reviews
    output:
      # catalog inherited from env.catalog (dev/stg/prd)
      schema: bakehouse
      table: media_customer_reviews

  media_customer_review_insights:
    input:
      # catalog inherited from env.catalog — input lives in the same env
      # as the output (ingestion job wrote it there)
      schema: bakehouse
      table: media_customer_reviews
    output:
      schema: bakehouse
      table: media_customer_review_insights

# --- Genie Spaces ---
#
# Declarative Genie Space definitions. Deploy via
# `notebooks/03_deploy_media_customer_insights_genie_space.py`. Per-env title
# suffixing is applied at deploy time so dev/stg/prod spaces don't collide
# in the same workspace.

genie_spaces:
  media_customer_insights:
    title: "Media Customer Review Insights"
    description: |
      Natural-language exploration of media customer reviews enriched with
      sentiment, NPS category, and topic extraction from Databricks AI
      functions. Backed by the media_customer_review_insights table.
    instructions:
      - "`sentiment` is one of: positive, negative, neutral, mixed."
      - "`nps_category` is one of: promoter, passive, detractor. A Net Promoter Score can be computed as (% promoters) minus (% detractors)."
      - "`topics` is a struct with fields taste, quality, service, price, ambience, variety. Each field contains the text span that mentions that topic, or NULL if the review does not discuss it."
      - "`franchise_id` identifies the bakery franchise (BIGINT). Use it to group or compare franchises."
      - "`review_date` is the timestamp the review was posted; use DATE_TRUNC for monthly / quarterly aggregations."
    sample_questions:
      - "Which franchise has the most positive reviews?"
      - "Show me detractors grouped by franchise, with their most commonly mentioned topic."
      - "What percentage of reviews mention service quality?"
      - "Sentiment breakdown by month for franchise 3000017."
      - "Compare how often taste vs quality is mentioned across franchises."
    tables:
      # Same {catalog, schema, table} shape as datasets. catalog optional.
      - schema: bakehouse
        table: media_customer_review_insights
        description: "Customer reviews enriched with sentiment, NPS category, and topics."
